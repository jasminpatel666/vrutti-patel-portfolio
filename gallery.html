<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Vrutti Patel</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
}
header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}
.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,.2);
}
nav{
    text-align:center;
    padding:15px;
}
a{
    text-decoration:none;
    color:#0d6efd;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Vrutti Patel Gallery</h1>
<p>My Photos & Memories</p>
</header>

<div class="gallery">
<img src="images/photo1.jpg" alt="Photo 1">
<img src="images/photo2.jpg" alt="Photo 2">
<img src="images/photo3.jpg" alt="Photo 3">
<img src="images/photo4.jpg" alt="Photo 4">
</div>

<nav>
<a href="index.html">⬅ Back to Home</a>
</nav>

</body>
</html>
